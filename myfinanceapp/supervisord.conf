[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:backend]
command=uvicorn --app-dir /app/backend main:app --host 127.0.0.1 --port 8000 --proxy-headers --forwarded-allow-ips="*" --log-level info --access-log --log-config /app/uvicorn_log.json
directory=/app
autostart=true
autorestart=true
# Forward output to the container's stdout/stderr so it appears in the
# Home Assistant add-on Log tab. maxbytes=0 disables rotation (required
# when the "logfile" is a stream rather than a real file).
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app",DATABASE_PATH="/app/data/finance.db",JWT_SECRET_KEY="%(ENV_JWT_SECRET_KEY)s"

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
